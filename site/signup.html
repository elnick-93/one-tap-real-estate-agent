<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>ONE TAP - Sign Up</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{margin:0;font-family:system-ui;background:#0f0f14;color:#f5f5f5}.wrap{max-width:400px;margin:0 auto;padding:48px 16px}h1{text-align:center}form{display:flex;flex-direction:column;gap:12px}input,button{padding:12px;border:1px solid #333;background:#1a1a22;color:#fff;border-radius:8px}button{background:#22c55e;color:#041f0f;font-weight:700;cursor:pointer}</style></head><body><div class="wrap"><h1>Create Your ONE TAP Account</h1><p>Get your API key for Zapier and access to the CRM dashboard.</p><form id="signupForm"><input type="email" id="email" placeholder="Your email" required><input type="password" id="password" placeholder="Password (min 8 chars)" required minlength="8"><button type="submit">Create Account & Get API Key</button></form><p id="result" style="color:#22c55e"></p><p><a href="login.html">Already have an account? Login</a></p></div><script>document.getElementById('signupForm').addEventListener('submit', async (e) => {e.preventDefault();const email = document.getElementById('email').value;const password = document.getElementById('password').value;const res = await fetch('http://127.0.0.1:3000/register', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, password})});const data = await res.json();if (data.token) {localStorage.setItem('token', data.token);localStorage.setItem('api_key', data.api_key);document.getElementById('result').innerHTML = `Account created! Your API key: <strong>${data.api_key}</strong><br><a href="admin.html">Go to Dashboard</a>`;} else {document.getElementById('result').textContent = data.error || 'Error';}});</script></body></html>
