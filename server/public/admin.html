<!DOCTYPE html>
<html><head><title>ONE TAP Dashboard</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{font-family:system-ui;padding:20px;background:#0f0f14;color:#f5f5f5}table{border-collapse:collapse;width:100%;margin-top:20px}th,td{border:1px solid #333;padding:8px;text-align:left}th{background:#1a1a22}button{background:#22c55e;color:#041f0f;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;margin:2px}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);align-items:center;justify-content:center}.modal-content{background:#1a1a22;padding:20px;border-radius:8px;width:90%;max-width:400px}</style></head><body><h1>ONE TAP CRM Dashboard</h1><p id="agentInfo"></p><div><button onclick="loadLeads()">Refresh Leads</button> <button onclick="getDailySummary()">Daily Summary</button> <button onclick="window.location='/api/billing-portal'">Billing Portal</button> <button onclick="showBookModal()">Book for Lead</button></div><table id="leadsTable"><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Source</th><th>Status</th><th>Actions</th></tr></thead><tbody></tbody></table><div id="modal" class="modal"><div class="modal-content"><h3>Book Appointment</h3><input type="text" id="leadId" placeholder="Lead ID"><input type="datetime-local" id="scheduled"><textarea id="notes" placeholder="Notes"></textarea><button onclick="bookAppointment()">Book</button><button onclick="closeModal()">Cancel</button></div></div><script>const token = localStorage.getItem('token');if(!token){window.location='/login.html';}async function loadLeads(){const res=await fetch('/api/leads',{headers:{'Authorization':'Bearer '+token}});const leads=await res.json();let html='';leads.forEach(l=>{html+=`<tr><td>${l.name}</td><td>${l.phone}</td><td>${l.email}</td><td>${l.source}</td><td>${l.status}</td><td><button onclick="updateStatus(${l.id},'qualified')">Qualify</button><button onclick="updateStatus(${l.id},'booked')">Booked</button></td></tr>`;});document.querySelector('#leadsTable tbody').innerHTML=html;}async function updateStatus(id,status){await fetch(`/api/leads/${id}/status`,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({status})});loadLeads();}function showBookModal(){document.getElementById('modal').style.display='flex';}function closeModal(){document.getElementById('modal').style.display='none';}async function bookAppointment(){const leadId=document.getElementById('leadId').value;const scheduled=document.getElementById('scheduled').value;const notes=document.getElementById('notes').value;await fetch('/api/book',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({lead_id:leadId,scheduled_at:scheduled,notes})});closeModal();loadLeads();alert('Appointment booked!');}async function getDailySummary(){const res=await fetch('/api/daily-summary',{headers:{'Authorization':'Bearer '+token}});const data=await res.json();alert(JSON.stringify(data,null,2));}loadLeads();</script></body></html>
