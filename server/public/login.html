<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>ONE TAP Login</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{margin:0;font-family:system-ui;background:#0f0f14;color:#f5f5f5}.wrap{max-width:400px;margin:0 auto;padding:48px 16px}h1{text-align:center}form{display:flex;flex-direction:column;gap:12px}input,button{padding:12px;border:1px solid #333;background:#1a1a22;color:#fff;border-radius:8px}button{background:#22c55e;color:#041f0f;font-weight:700;cursor:pointer}</style></head><body><div class="wrap"><h1>ONE TAP Login</h1><form id="loginForm"><input type="email" id="email" placeholder="Email" required><input type="password" id="password" placeholder="Password" required><button type="submit">Login</button></form><p id="result"></p><p><a href="signup.html">Need an account? Sign up</a></p></div><script>document.getElementById('loginForm').addEventListener('submit',async(e)=>{e.preventDefault();const email=document.getElementById('email').value;const password=document.getElementById('password').value;const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});const data=await res.json();if(data.token){localStorage.setItem('token',data.token);localStorage.setItem('api_key',data.api_key);window.location='admin.html';}else{document.getElementById('result').textContent=data.error||'Login failed';}});</script></body></html>
